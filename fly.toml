# fly.toml — FuelWatch Fly.io configuration
# Change `app` to your chosen Fly app name before deploying.
# Run: fly launch --no-deploy   (first time)
#      fly deploy               (every deploy)

app = "fuelwatch-dashboard"
primary_region = "arn"

[build]
  # Uses the Dockerfile in the repo root

[http_service]
  internal_port = 80       # nginx listens on 80
  force_https   = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type       = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
